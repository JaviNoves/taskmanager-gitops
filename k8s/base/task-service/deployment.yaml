apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: task-service
          image: ghcr.io/javinoves/task-service:dev
          ports:
            - containerPort: 8083
          env:
            - name: MYSQL_URL
              value: jdbc:mysql://mysql-task:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: MYSQL_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: task-service-secret
                  key: MYSQL_ROOT_USERNAME
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-service-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka
            - name: INTERNAL_REMINDERS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: task-service-secret
                  key: INTERNAL_REMINDERS_TOKEN
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: guest
            - name: SPRING_RABBITMQ_PASSWORD
              value: guest
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"