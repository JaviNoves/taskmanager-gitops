apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ai-service
          image: ghcr.io/javinoves/ai-service:dev
          ports:
            - containerPort: 8086
          env:
            - name: CONFIG_SERVER_URI
              value: http://config-server:8888
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "700m"
              memory: "1Gi"
