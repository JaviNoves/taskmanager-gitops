apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ai-service
          image: ghcr.io/javinoves/ai-service:dev
          ports:
            - containerPort: 8086
          env:
            - name: POSTGRESQL_URL
              value: jdbc:postgresql://postgres-ai:5432/aidb
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: POSTGRES_USERNAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: POSTGRES_PASSWORD
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: GEMINI_API_KEY
            - name: GEMINI_CHAT_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: GEMINI_CHAT_MODEL
            - name: GEMINI_EMBEDDING_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-service-secret
                  key: GEMINI_EMBEDDING_MODEL
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8086
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "700m"
              memory: "1Gi"