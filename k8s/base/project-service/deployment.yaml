apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: project-service
          image: ghcr.io/javinoves/project-service:dev
          ports:
            - containerPort: 8082
          env:
            - name: MYSQL_URL
              value: jdbc:mysql://mysql-project:3306/projectdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: MYSQL_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: project-service-secret
                  key: MYSQL_ROOT_USERNAME
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-service-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /livez
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"