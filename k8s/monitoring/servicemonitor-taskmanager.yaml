apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: taskmanager-services
  namespace: monitoring
  labels:
    release: kube-prom-stack
spec:
  namespaceSelector:
    matchNames:
      - taskmanager-dev
      - taskmanager-prod
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s