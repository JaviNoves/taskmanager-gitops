#Configuracion para que alloy pueda recolectar logs de los microservicios y enviarlos a Loki.
# Se asume que los servicios tienen el label "monitoring: enabled" para ser descubiertos por Alloy.
alloy:
  mounts:
    varlog: true

  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.local.receiver]
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset